<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobionics - Project Upload</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- Hero Section -->
  <section class="hero d-flex align-items-center justify-content-center text-center">
    <div class="container">
      <h1>Welcome to Bobionics SkipSlides</h1>
      <p>Upload your project and let AI generate ready-to-present slides instantly.</p>
    </div>
  </section>

  <!-- Upload Card Section -->
  <section class="upload-section d-flex justify-content-center">
    <div class="upload-card shadow-lg p-4">
      <h2 class="mb-4">Upload Your Project</h2>
      <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" class="form-control mb-3" required>
        <button type="submit" class="btn btn-upload w-100">
          <i class="bi bi-cloud-upload"></i> Upload
        </button>
      </form>
      <p class="mt-3 text-muted">Accepted format: .zip</p>
    </div>
  </section>

  <footer class="text-center py-3 mt-auto">
    &copy; 2026 Bobionics. All rights reserved.
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
